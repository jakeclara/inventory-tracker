<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head('Inactive Items')}"></head>

<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container container--constrained mt-5 px-3">

        <div class="mb-2">
            <a th:href="@{/dashboard}" class="app-link-subtle">
                ← Back to Dashboard
            </a>
        </div>

        <div class="mb-4">
            <h1>Inactive Items</h1>
            <p th:if="${#lists.isEmpty(inactiveItems.inventoryItems)}">No inactive items found</p>
        </div>

        <div class="table-responsive app-table-wrapper">
            <table th:if="${!#lists.isEmpty(inactiveItems.inventoryItems)}" class="table table-striped align-middle">
                <thead class="app-header app-header--primary">
                    <tr>
                        <th>Name</th>
                        <th>SKU</th>
                        <th>Quantity</th>
                        <th>Unit</th>
                        <th>Reorder Threshold</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="item : ${inactiveItems.inventoryItems}">

                        <td th:text="${item.name}"></td>
                        <td th:text="${item.sku}"></td>

                        <td>
                            <span th:text="${item.currentQuantity}"
                                th:classappend="${item.lowStock} ? ' low-stock-indicator' : ''"></span>
                        </td>

                        <td th:text="${item.unit}"></td>
                        <td th:text="${item.reorderThreshold}"></td>

                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{/items/{id}(id=${item.id})}">
                                View
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div
            th:replace="~{fragments/pagination :: appPagination(${inactiveItems.pagination}, '/items/inactive', null)}">
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</body>

</html>
