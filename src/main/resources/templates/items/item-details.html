<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head('Item Details')}"></head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-5 px-3">
        <h1 th:text="${itemDetails.name}">Item Name</h1>
        <p th:text="|SKU: ${itemDetails.sku}|">Item SKU</p>

        <div class="row">
            <div class="col-lg-6">
                <div class="card app-card">

                    <div class="card-header app-primary-header">
                        Item Summary
                    </div>

                    <div class="card-body">

                        <div class="row mb-2 pb-2 border-bottom">

                            <div class="col border-end">
                                <div class="label-text-soft">Current Quantity:</div>

                                <div class="metric-row">
                                    <span th:text="${itemDetails.currentQuantity}" class="app-metric-value"></span>
                                    <span th:text="${itemDetails.unit}" class="app-metric-unit"></span>
                                </div>

                                <div th:if="${itemDetails.lowStock}" class="low-stock-indicator mt-1">
                                    <i class="bi bi-exclamation-triangle"></i>
                                    Low Stock
                                </div>
                            </div>

                            <div class="col">
                                <div class="label-text-soft">Reorder Threshold:</div>

                                <div class="metric-row">
                                    <span th:text="${itemDetails.reorderThreshold}" class="app-metric-value"></span>
                                    <span th:text="${itemDetails.unit}" class="app-metric-unit"></span>
                                </div>
                            </div>

                        </div>

                        <div class="row pb-2">

                            <div class="col">
                                <div class="label-text-soft">Status:</div>

                                <div class="metric-row">
                                    <span th:text="${itemDetails.isActive ? 'Active' : 'Inactive'}" class="app-pill"
                                        th:classappend="${itemDetails.isActive} ? ' app-pill--success' : ' app-pill--danger'">
                                    </span>
                                </div>
                            </div>

                        </div>

                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/items/{id}/edit(id=${itemDetails.id})}"
                            class="btn btn-outline-dark btn-sm">
                            Edit Item
                        </a>

                    </div>
                </div>
            </div>
        </div>

        <section>
            <div th:replace="~{movements/movement-history :: movement-history}"></div>
        </section>

        <section th:if="${itemDetails.isActive}">
            <div th:replace="~{movements/movement-form :: movement-form}"></div>
        </section>

    </div>

</body>

</html>
