<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head('Item Details')}"></head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container container--constrained mt-5 px-3">

        <div class="mb-2">
            <a th:href="@{/dashboard}" class="app-link-subtle">
                ← Back to Dashboard
            </a>
        </div>

        <div class="d-flex justify-content-between align-items-start mb-2">
            <div>
                <h1 th:text="${itemDetails.name}">Item Name</h1>
                <p th:text="|SKU: ${itemDetails.sku}|">Item SKU</p>
            </div>

            <a sec:authorize="hasRole('ADMIN')" th:href="@{/items/{id}/edit(id=${itemDetails.id})}"
                class="btn btn-sm btn-secondary">
                Edit Item
            </a>
        </div>

        <div class="row g-4 mb-2">
            <div class="col-lg-6">

                <div th:replace="~{items/item-summary-card :: item-summary-card(${itemDetails})}"></div>

            </div>

            <div class="col-lg-6" th:if="${itemDetails.isActive}">

                <div th:replace="~{movements/movement-form :: movement-form}"></div>

            </div>
        </div>

        <div class="row">
            <div class="col-lg-12">

                <div id="movement-history">
                    <div th:replace="~{movements/movement-history :: movement-history}"></div>
                </div>

            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>

    </div>

</body>

</html>
