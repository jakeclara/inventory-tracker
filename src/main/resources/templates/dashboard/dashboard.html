<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head('Inventory Dashboard')}"></head>

<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mt-3 text-center w-50 mx-auto"
        role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="container container--constrained mt-5 px-3">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-4">
            <div>
                <h1>Inventory Dashboard</h1>

                <p th:if="${#lists.isEmpty(dashboard.inventoryItems)}">No inventory items found</p>

                <p>
                    Low stock items:
                    <strong th:text="${dashboard.lowStockCount}"
                        th:classappend="${dashboard.lowStockCount > 0} ? ' text-danger'"></strong>
                </p>
            </div>

            <div sec:authorize="hasRole('ADMIN')" class="d-flex gap-2">
                <a th:href="@{/items/new}" class="btn btn-primary">Add Item</a>

                <a th:href="@{/items/inactive}" class="btn btn-outline-secondary">View Inactive</a>
            </div>
        </div>

        <div class="d-none d-md-block">
            <div class="table-responsive app-table-wrapper">

                <table th:if="${!#lists.isEmpty(dashboard.inventoryItems)}" class="table table-striped align-middle">
                    <thead class="app-header app-header--primary">
                        <tr>
                            <th>Name</th>
                            <th>SKU</th>
                            <th>Quantity</th>
                            <th>Unit</th>
                            <th>Reorder Threshold</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${dashboard.inventoryItems}">

                            <td th:text="${item.name}"></td>
                            <td th:text="${item.sku}" class="text-nowrap"></td>

                            <td>
                                <span th:text="${item.currentQuantity}"
                                    th:classappend="${item.lowStock} ? ' low-stock-indicator' : ''"></span>
                            </td>

                            <td th:text="${item.unit}"></td>
                            <td th:text="${item.reorderThreshold}"></td>

                            <td class="text-end">
                                <a class="btn btn-sm btn-outline-primary" th:href="@{/items/{id}(id=${item.id})}">
                                    View
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>

            </div>
        </div>

        <div class="d-block d-md-none">

            <div th:replace="~{items/item-mobile-card :: item-mobile-card(${dashboard.inventoryItems})}"></div>

        </div>



        <div th:replace="~{fragments/pagination :: appPagination(${dashboard.pagination}, '/dashboard', null)}">
        </div>

    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
