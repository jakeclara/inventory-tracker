<div th:fragment="movement-history">

    <h2>Movement History</h2>

    <p th:if="${#lists.isEmpty(movementHistory)}">No movements found for this item.</p>

    <div class="table-responsive app-table-wrapper">

        <table th:if="${!#lists.isEmpty(movementHistory)}" class="table table-striped align-middle">
            <thead class="app-header app-header--primary">
                <tr>
                    <th>Type</th>
                    <th>Quantity</th>
                    <th>Date</th>
                    <th>Reference</th>
                    <th>Created By</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="movement : ${movementHistory}">
                    <td th:text="${movement.movementType}">Type</td>
                    <td th:text="${movement.quantity}">Quantity</td>
                    <td th:text="${movement.movementDate}">Date</td>
                    <td th:text="${movement.reference}">Reference</td>
                    <td th:text="${movement.createdBy}">Created By</td>
                </tr>
            </tbody>
        </table>

    </div>

    <div
        th:replace="~{fragments/pagination :: appPagination(${movementPagination}, '/items/' + ${itemDetails.id}, 'movement-history')}">
    </div>

</div>
