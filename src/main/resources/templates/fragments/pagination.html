<div th:fragment="appPagination(pagination, baseUrl, anchor)" class="mt-3 app-pagination"
  th:if="${pagination.totalPages > 1}">

  <a th:if="${pagination.hasPrevious}" th:href="@{${baseUrl}(page=${pagination.currentPage - 1})}
            + (${anchor} != null ? '#' + ${anchor} : '')" class="app-link-subtle">Previous</a>

  <span>
    Page [[${pagination.currentPage + 1}]]
    of [[${pagination.totalPages}]]
  </span>

  <a th:if="${pagination.hasNext}" th:href="@{${baseUrl}(page=${pagination.currentPage + 1})}
            + (${anchor} != null ? '#' + ${anchor} : '')" class="app-link-subtle">Next</a>
</div>
