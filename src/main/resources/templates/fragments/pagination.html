<div th:fragment="appPagination(pagination, baseUrl, extraParams)"
     class="mt-3 app-pagination"
     th:if="${pagination.totalPages > 1}">

    <a th:if="${pagination.hasPrevious}"
       th:href="@{${baseUrl}(${extraParams != null ? extraParams : {}},
                page=${pagination.currentPage - 1})}">Previous</a>

    <span>
        Page [[${pagination.currentPage + 1}]]
        of [[${pagination.totalPages}]]
    </span>

    <a th:if="${pagination.hasNext}"
       th:href="@{${baseUrl}(${extraParams != null ? extraParams : {}},
                page=${pagination.currentPage + 1})}">Next</a>
</div>
